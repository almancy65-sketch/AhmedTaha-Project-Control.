<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAHA AI | SUPREME OS - FULL ACTIVATION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@500;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #020617; color: #f8fafc; margin: 0; }
        .cyber-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(59, 130, 246, 0.1); border-radius: 2rem; }
        .progress-glow { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); transition: width 1s ease; }
        .editable:focus { background: rgba(59, 130, 246, 0.1); outline: 2px dashed #3b82f6; border-radius: 8px; }
        .scanning { position: absolute; height: 2px; width: 100%; background: #3b82f6; animation: scan 3s infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="pb-32">

    <nav class="sticky top-0 z-[100] bg-slate-950/80 backdrop-blur-md p-5 border-b border-white/5 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="p-3 bg-blue-600 rounded-2xl shadow-lg shadow-blue-500/20">
                <i data-lucide="shield-check" class="text-white w-6 h-6"></i>
            </div>
            <div>
                <h1 style="font-family:'Orbitron'" class="text-xs font-black tracking-widest text-blue-400 uppercase">Taha Intelligence System</h1>
                <p class="text-[9px] font-bold text-slate-500">ENGINEERING SOVEREIGNTY v4.0</p>
            </div>
        </div>
        <button onclick="createNewProject()" class="p-3 bg-blue-600/10 text-blue-400 rounded-xl border border-blue-500/20">
            <i data-lucide="plus"></i>
        </button>
    </nav>

    <main id="app-content" class="p-4 space-y-6">
        
        <section id="dashboard" class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="cyber-panel p-6 border-r-4 border-blue-600">
                    <span class="text-[10px] text-slate-500 font-bold uppercase">المشروعات النشطة</span>
                    <h2 id="total-p" class="text-4xl font-black text-white">0</h2>
                </div>
                <div class="cyber-panel p-6 border-r-4 border-green-500">
                    <span class="text-[10px] text-slate-500 font-bold uppercase">كفاءة الإنجاز $E$</span>
                    <h2 id="avg-p" class="text-4xl font-black text-green-500">0%</h2>
                </div>
            </div>
            
            <div id="project-grid" class="space-y-4">
                </div>
        </section>

        <section id="control-view" class="hidden animate-in slide-in-from-bottom duration-500 space-y-6">
            <button onclick="showDashboard()" class="text-xs font-bold text-slate-500 flex items-center gap-2"><i data-lucide="arrow-right"></i> الرجوع</button>
            <div class="cyber-panel p-8">
                <h2 id="active-p-name" class="text-3xl font-black editable" contenteditable="true">اسم المشروع</h2>
                <p id="active-p-loc" class="text-blue-500 text-xs font-bold mt-2 uppercase tracking-widest" contenteditable="true">الموقع</p>
            </div>

            <div id="ai-insight" class="cyber-panel p-5 border-l-4 border-yellow-500 flex items-center gap-4">
                <div class="bg-yellow-500/10 p-3 rounded-full"><i data-lucide="brain" class="text-yellow-500"></i></div>
                <p id="ai-text" class="text-xs text-slate-300 italic leading-relaxed">تحليل المسار الحرج جاري...</p>
            </div>

            <div id="wbs-container" class="space-y-4"></div>
            
            <button onclick="addStage()" class="w-full p-4 border-2 border-dashed border-slate-800 rounded-3xl text-slate-500 text-xs font-bold">+ إضافة مرحلة (WBS)</button>
        </section>

    </main>

    <nav class="fixed bottom-8 left-8 right-8 cyber-panel p-2 flex justify-around items-center z-[500] border-white/10 shadow-2xl">
        <button onclick="showDashboard()" class="p-4 text-blue-500"><i data-lucide="layout-grid"></i></button>
        <button onclick="alert('BIM Model Loading...')" class="p-4 text-slate-500"><i data-lucide="box"></i></button>
        <button onclick="openCamera()" class="p-4 text-slate-500"><i data-lucide="camera"></i></button>
        <button onclick="generateWhatsAppReport()" class="p-4 text-slate-500"><i data-lucide="send"></i></button>
    </nav>

    <script>
        // 1. Database & Seed Data (The Solution to the Empty Interface)
        let projects = JSON.parse(localStorage.getItem('taha_v4_db')) || [
            {
                id: 1710000000000,
                name: "برج الجوهرة السكني",
                location: "القاهرة الجديدة - التجمع الخامس",
                stages: [
                    { name: "الهيكل الإنشائي", progress: 85, tasks: ["نجارة القواعد", "حدادة الأعمدة", "صب الأسقف"] },
                    { name: "أعمال المباني والعزل", progress: 40, tasks: ["توريد الطوب", "بناء الدور الأول"] },
                    { name: "التشطيبات المعمارية", progress: 10, tasks: ["تأسيس الكهرباء"] }
                ]
            },
            {
                id: 1710000000001,
                name: "فيلا العبور (نموذج A)",
                location: "المنطقة الخامسة",
                stages: [
                    { name: "أعمال الحفر والأساسات", progress: 100, tasks: ["الحفر", "الخنزيرة"] },
                    { name: "المباني", progress: 10, tasks: ["بناء السور"] }
                ]
            }
        ];

        let activePId = null;

        // 2. Core Functions
        function sync() {
            localStorage.setItem('taha_v4_db', JSON.stringify(projects));
            renderDashboard();
            if(activePId) renderDetails();
        }

        function renderDashboard() {
            const grid = document.getElementById('project-grid');
            grid.innerHTML = '';
            let totalProg = 0;

            projects.forEach(p => {
                const avg = p.stages.length ? Math.round(p.stages.reduce((a,b)=>a+b.progress,0)/p.stages.length) : 0;
                totalProg += avg;
                grid.innerHTML += `
                    <div onclick="openProject(${p.id})" class="cyber-panel p-6 active:scale-95 transition-all border-r-4 border-blue-500">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-xl font-bold">${p.name}</h3>
                            <button onclick="deleteP(event, ${p.id})" class="text-red-900"><i data-lucide="trash-2" class="w-4"></i></button>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="flex-1 bg-slate-800 h-1.5 rounded-full overflow-hidden">
                                <div class="bg-blue-600 h-full progress-glow" style="width: ${avg}%"></div>
                            </div>
                            <span class="text-xs font-black text-blue-500">${avg}%</span>
                        </div>
                    </div>`;
            });

            document.getElementById('total-p').innerText = projects.length;
            document.getElementById('avg-p').innerText = projects.length ? Math.round(totalProg/projects.length) + "%" : "0%";
            lucide.createIcons();
        }

        function openProject(id) {
            activePId = id;
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('control-view').classList.remove('hidden');
            renderDetails();
        }

        function renderDetails() {
            const p = projects.find(x => x.id === activePId);
            document.getElementById('active-p-name').innerText = p.name;
            document.getElementById('active-p-loc').innerText = p.location;
            
            const container = document.getElementById('wbs-container');
            container.innerHTML = '';
            p.stages.forEach((s, sIdx) => {
                container.innerHTML += `
                    <div class="cyber-panel p-6">
                        <div class="flex justify-between mb-4">
                            <span class="text-sm font-bold text-slate-300" contenteditable="true" onblur="editStageName(${sIdx}, this.innerText)">${s.name}</span>
                            <span class="text-blue-500 font-black">${s.progress}%</span>
                        </div>
                        <input type="range" value="${s.progress}" oninput="updateProg(${sIdx}, this.value)" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-blue-600 mb-4">
                        <div class="flex flex-wrap gap-2">
                            ${s.tasks.map((t, tIdx) => `<span class="text-[9px] bg-slate-900 px-3 py-1 rounded-lg border border-white/5" contenteditable="true" onblur="editTask(${sIdx}, ${tIdx}, this.innerText)">${t}</span>`).join('')}
                            <button onclick="addTask(${sIdx})" class="text-[9px] text-blue-500 font-bold">+ إضافة بند</button>
                        </div>
                    </div>`;
            });
            updateAI(p);
            lucide.createIcons();
        }

        function updateProg(sIdx, val) {
            const p = projects.find(x => x.id === activePId);
            p.stages[sIdx].progress = parseInt(val);
            document.querySelectorAll('#wbs-container .text-blue-500')[sIdx].innerText = val + '%';
            updateAI(p);
            localStorage.setItem('taha_v4_db', JSON.stringify(projects));
        }

        function updateAI(p) {
            const aiText = document.getElementById('ai-text');
            const total = Math.round(p.stages.reduce((a,b)=>a+b.progress,0)/p.stages.length);
            if(total < 30) aiText.innerText = "تحذير هندسي: التركيز الآن يجب أن يكون على جودة صب الخرسانات لضمان عدم حدوث شروخ إجهاد.";
            else if(total < 80) aiText.innerText = "نصيحة طه: ابدأ بتنسيق مسارات التكييف مع أعمال الجبس بورد فوراً لتجنب التكسير.";
            else aiText.innerText = "مرحلة التسليم: قم بإعداد Punch List لجميع الملاحظات المعمارية النهائية.";
        }

        function showDashboard() {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('control-center')?.classList.add('hidden'); // Fix for some browsers
            document.getElementById('control-view').classList.add('hidden');
            renderDashboard();
        }

        function createNewProject() {
            const n = prompt("اسم المشروع الجديد:");
            if(n) {
                projects.push({ id: Date.now(), name: n, location: "قيد التحديد", stages: [{name: "المرحلة الأولى", progress: 0, tasks: ["بداية العمل"]}] });
                sync();
            }
        }

        function deleteP(e, id) {
            e.stopPropagation();
            if(confirm('حذف نهائي؟')) { projects = projects.filter(x => x.id !== id); sync(); }
        }

        // Initialize on load
        window.onload = () => {
            renderDashboard();
            lucide.createIcons();
        };

        function generateWhatsAppReport() {
            if(!activePId) return alert("اختر مشروعاً أولاً");
            const p = projects.find(x => x.id === activePId);
            const text = `تقرير الموقع - م. أحمد طه\nمشروع: ${p.name}\nنسبة الإنجاز: ${Math.round(p.stages.reduce((a,b)=>a+b.progress,0)/p.stages.length)}%`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
        }
    </script>
</body>
</html>
