<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAHA SUPREME OS | م. أحمد طه</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #020617; color: #f1f5f9; user-select: none; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .active-tab { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .editable:hover { background: rgba(59, 130, 246, 0.1); cursor: pointer; border-radius: 4px; }
        input[type="range"] { accent-color: #3b82f6; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .clash-alert { animation: pulse-red 1s infinite; color: #ef4444; }
    </style>
</head>
<body class="min-h-screen pb-32">

    <nav class="glass sticky top-0 z-[100] p-4 flex justify-between items-center border-b border-blue-500/20 shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-blue-600 rounded-xl shadow-lg shadow-blue-500/30">
                <i data-lucide="shield-check" class="text-white w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tighter uppercase">Taha <span class="text-blue-500">Master Control</span></h1>
                <div class="flex items-center gap-1 text-[8px] text-green-500 font-bold uppercase tracking-widest">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-ping"></span> Online System
                </div>
            </div>
        </div>
        <button onclick="addNewProject()" class="p-3 bg-blue-600/10 rounded-full border border-blue-500/30 text-blue-500 hover:bg-blue-600 hover:text-white transition-all">
            <i data-lucide="plus"></i>
        </button>
    </nav>

    <main id="app-container" class="p-4">
        
        <section id="dashboard-view" class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-5 rounded-3xl border-r-4 border-blue-500">
                    <p class="text-[10px] text-slate-500 font-bold">إجمالي المشاريع</p>
                    <h3 id="stat-total" class="text-3xl font-black">0</h3>
                </div>
                <div class="glass p-5 rounded-3xl border-r-4 border-purple-500">
                    <p class="text-[10px] text-slate-500 font-bold">معدل الإنجاز</p>
                    <h3 id="stat-avg" class="text-3xl font-black">0%</h3>
                </div>
            </div>
            <div id="projects-list" class="space-y-4"></div>
        </section>

        <section id="control-view" class="hidden space-y-6 animate-in slide-in-from-left duration-300">
            <button onclick="showView('dashboard-view')" class="flex items-center gap-2 text-xs text-slate-500 bg-slate-800/50 px-4 py-2 rounded-full">
                <i data-lucide="chevron-right" class="w-4 h-4"></i> العودة للمصفوفة
            </button>
            
            <div class="glass p-6 rounded-[2.5rem]">
                <h2 id="view-p-name" class="text-3xl font-black editable" onclick="editContent(this, 'name')">اسم المشروع</h2>
                <p id="view-p-loc" class="text-blue-500 text-xs font-bold mt-1 editable" onclick="editContent(this, 'location')">الموقع: اضغط للتعديل</p>
            </div>

            <div class="glass p-4 rounded-2xl border-l-4 border-yellow-500 flex gap-3">
                <i data-lucide="brain-circuit" class="text-yellow-500"></i>
                <div>
                    <h4 class="text-[10px] font-bold text-yellow-500 uppercase">توصية الذكاء الاصطناعي</h4>
                    <p id="ai-text" class="text-xs text-slate-400 italic mt-1">جاري تحليل المخاطر بناءً على البيانات المدخلة...</p>
                </div>
            </div>

            <div id="wbs-stages" class="space-y-4"></div>
            
            <button onclick="addStage()" class="w-full p-4 border-2 border-dashed border-slate-800 rounded-2xl text-slate-500 text-xs font-bold flex items-center justify-center gap-2">
                <i data-lucide="plus-circle" class="w-4 h-4"></i> إضافة مرحلة عمل جديدة (WBS)
            </button>
        </section>

        <section id="bim-view" class="hidden space-y-6">
            <h2 class="text-2xl font-black mb-6">BIM Clash Detection</h2>
            <div class="glass p-6 rounded-[2.5rem] aspect-square flex items-center justify-center relative overflow-hidden border-2 border-blue-500/20">
                <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-20"></div>
                <div class="relative w-full h-full border border-blue-500/30 rounded-lg flex items-center justify-center">
                    <i data-lucide="box" class="w-32 h-32 text-blue-500/20"></i>
                    <div class="absolute top-1/4 left-1/3 clash-alert flex flex-col items-center">
                        <i data-lucide="alert-triangle"></i>
                        <span class="text-[8px] font-bold">CLASH-01: MEP/STRUCT</span>
                    </div>
                </div>
            </div>
            <div id="clash-list" class="space-y-2">
                <div class="glass p-4 rounded-xl text-xs flex justify-between">
                    <span>تعارض المواسير مع الكمرة الرابطة</span>
                    <span class="text-red-500 font-bold tracking-tighter uppercase">High Priority</span>
                </div>
            </div>
        </section>

        <section id="field-view" class="hidden fixed inset-0 z-[200] bg-black">
            <video id="site-cam" autoplay playsinline class="w-full h-full object-cover"></video>
            <div class="absolute inset-0 border-[20px] border-black/20 pointer-events-none flex items-center justify-center">
                <div class="w-64 h-64 border border-white/20 rounded-full"></div>
            </div>
            <div class="absolute bottom-10 left-0 right-0 flex justify-center gap-6 p-6">
                <button onclick="takeSitePhoto()" class="w-20 h-20 bg-white rounded-full border-8 border-slate-900 shadow-2xl"></button>
                <button onclick="closeCamera()" class="absolute right-10 bottom-14 bg-red-600 p-4 rounded-full"><i data-lucide="x"></i></button>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-6 left-6 right-6 glass p-2 rounded-full flex justify-around items-center z-[150] shadow-2xl border-white/5">
        <button onclick="showView('dashboard-view')" class="nav-icon p-4 text-blue-500"><i data-lucide="layout-dashboard"></i></button>
        <button onclick="showView('bim-view')" class="nav-icon p-4 text-slate-500"><i data-lucide="layers"></i></button>
        <button onclick="openCamera()" class="nav-icon p-4 text-slate-500"><i data-lucide="camera"></i></button>
        <button onclick="showReportOptions()" class="nav-icon p-4 text-slate-500"><i data-lucide="file-text"></i></button>
    </nav>

    <script>
        // --- Core Engine & Database ---
        let projects = JSON.parse(localStorage.getItem('taha_master_db')) || [];
        let activePId = null;
        let stream = null;

        function save() {
            localStorage.setItem('taha_master_db', JSON.stringify(projects));
            renderDashboard();
            if(activePId) updateAIInsight();
        }

        function showView(id) {
            ['dashboard-view', 'control-view', 'bim-view', 'field-view'].forEach(v => {
                document.getElementById(v).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            
            // Update icons colors
            document.querySelectorAll('.nav-icon').forEach(btn => btn.classList.replace('text-blue-500', 'text-slate-500'));
            // This is a simplified logic for icon highlighting
        }

        // --- Project Management ---
        function addNewProject() {
            const name = prompt("أدخل اسم المشروع الجديد:");
            if(!name) return;
            const newP = {
                id: Date.now(),
                name: name,
                location: "موقع غير محدد",
                stages: [
                    { name: "أعمال الخرسانات", progress: 0, tasks: ["حفر", "نجارة", "صب"] }
                ]
            };
            projects.push(newP);
            save();
        }

        function renderDashboard() {
            const list = document.getElementById('projects-list');
            list.innerHTML = '';
            let totalProg = 0;

            projects.forEach(p => {
                const avg = p.stages.length ? Math.round(p.stages.reduce((a,b) => a + b.progress, 0) / p.stages.length) : 0;
                totalProg += avg;
                list.innerHTML += `
                    <div onclick="openProject(${p.id})" class="glass p-6 rounded-[2rem] active:scale-95 transition-all border-l-4 border-blue-600">
                        <div class="flex justify-between items-start mb-4">
                            <h4 class="text-xl font-bold">${p.name}</h4>
                            <button onclick="deleteProject(event, ${p.id})" class="text-red-900"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="flex-1 bg-slate-800 h-2 rounded-full overflow-hidden">
                                <div class="bg-blue-600 h-full shadow-[0_0_10px_#3b82f6]" style="width: ${avg}%"></div>
                            </div>
                            <span class="text-xs font-black">${avg}%</span>
                        </div>
                    </div>`;
            });

            document.getElementById('stat-total').innerText = projects.length;
            document.getElementById('stat-avg').innerText = projects.length ? Math.round(totalProg/projects.length) + "%" : "0%";
            lucide.createIcons();
        }

        function openProject(id) {
            activePId = id;
            const p = projects.find(x => x.id === id);
            showView('control-view');
            document.getElementById('view-p-name').innerText = p.name;
            document.getElementById('view-p-loc').innerText = "الموقع: " + p.location;
            renderStages(p);
            updateAIInsight();
        }

        function editContent(el, field) {
            const newVal = prompt("تعديل البيانات:", el.innerText.replace("الموقع: ", ""));
            if(newVal !== null) {
                const p = projects.find(x => x.id === activePId);
                p[field] = newVal;
                el.innerText = field === 'location' ? "الموقع: " + newVal : newVal;
                save();
            }
        }

        function renderStages(p) {
            const container = document.getElementById('wbs-stages');
            container.innerHTML = '';
            p.stages.forEach((s, idx) => {
                container.innerHTML += `
                    <div class="glass p-5 rounded-3xl">
                        <div class="flex justify-between mb-4">
                            <span class="text-sm font-bold editable" onclick="editStageName(${idx})">${s.name}</span>
                            <span class="text-blue-500 font-black">${s.progress}%</span>
                        </div>
                        <input type="range" value="${s.progress}" oninput="updateProg(${idx}, this.value)" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer mb-4">
                        <div class="flex flex-wrap gap-2" id="tasks-${idx}">
                            ${s.tasks.map(t => `<span class="text-[9px] bg-slate-900 px-3 py-1.5 rounded-full border border-slate-800 text-slate-400">${t}</span>`).join('')}
                            <button onclick="addTask(${idx})" class="text-[9px] bg-blue-600/10 text-blue-500 px-3 py-1.5 rounded-full border border-blue-500/20 font-bold">+ إضافة بند</button>
                        </div>
                    </div>`;
            });
        }

        function updateProg(idx, val) {
            const p = projects.find(x => x.id === activePId);
            p.stages[idx].progress = parseInt(val);
            event.target.previousElementSibling.querySelector('.text-blue-500').innerText = val + '%';
            save();
        }

        function addTask(sIdx) {
            const task = prompt("اسم البند الجديد (مثلاً: أعمال العزل):");
            if(task) {
                projects.find(x => x.id === activePId).stages[sIdx].tasks.push(task);
                save();
                openProject(activePId);
            }
        }

        function addStage() {
            const name = prompt("اسم مرحلة العمل (WBS):");
            if(name) {
                projects.find(x => x.id === activePId).stages.push({ name: name, progress: 0, tasks: [] });
                save();
                openProject(activePId);
            }
        }

        function updateAIInsight() {
            const p = projects.find(x => x.id === activePId);
            const aiText = document.getElementById('ai-text');
            const total = Math.round(p.stages.reduce((a,b) => a + b.progress, 0) / p.stages.length);
            
            if(total < 30) aiText.innerText = "تحليل: المشروع في مرحلة حرجة من التأسيس. ننصح بمراجعة جودة الخامات الموردة فوراً لضمان عدم تأخر المسار الحرج.";
            else if(total < 70) aiText.innerText = "تحليل: العمل يسير بمعدل جيد. يرجى البدء في التنسيق بين مقاولي الباطن لتجنب التعارضات في مرحلة التشطيب.";
            else aiText.innerText = "تحليل: اقتراب التسليم. جاري إعداد قائمة الملاحظات النهائية (Snag List). العمل ممتاز يا بشمهندس أحمد.";
        }

        // --- Media Engine ---
        async function openCamera() {
            showView('field-view');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('site-cam').srcObject = stream;
            } catch (err) { alert("الكاميرا تتطلب إذن الوصول من المتصفح."); showView('dashboard-view'); }
        }

        function closeCamera() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            showView('dashboard-view');
        }

        function takeSitePhoto() {
            alert("تم التقاط الصورة وربطها بتقرير اليوم الحالي بنجاح.");
            closeCamera();
        }

        function deleteProject(e, id) {
            e.stopPropagation();
            if(confirm('سيتم مسح بيانات المشروع نهائياً، هل أنت متأكد؟')) {
                projects = projects.filter(p => p.id !== id);
                save();
            }
        }

        function showReportOptions() {
            if(!activePId) { alert("يرجى اختيار مشروع أولاً لتوليد التقرير."); return; }
            const p = projects.find(x => x.id === activePId);
            const msg = `تقرير إنجاز مشروع: ${p.name}\nالحالة: ${Math.round(p.stages.reduce((a,b) => a + b.progress, 0) / p.stages.length)}%\n\nتحياتي، م. أحمد طه`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // Initialization
        renderDashboard();
        lucide.createIcons();
    </script>
</body>
</html>
