<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT MANAGER | م. أحمد طه</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #020617; color: #f1f5f9; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(59, 130, 246, 0.2); }
        .neon-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); border: 1px solid #3b82f6; }
        .report-modal { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-28">

    <nav class="glass sticky top-0 z-50 p-5 flex justify-between items-center border-b border-blue-500/30 shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-500/20">
                <i data-lucide="cpu" class="w-6 h-6 text-white"></i>
            </div>
            <div>
                <h1 class="text-sm font-bold text-white uppercase tracking-tighter">ENGINEER TAHA AI</h1>
                <p class="text-[9px] text-blue-400 font-bold uppercase tracking-widest leading-none">Smart Control Center</p>
            </div>
        </div>
        <button onclick="showAddProjectModal()" class="bg-slate-800 p-2.5 rounded-full border border-slate-700">
            <i data-lucide="plus" class="w-5 h-5 text-blue-400"></i>
        </button>
    </nav>

    <main class="p-4">
        <section id="dashboard-view" class="space-y-6">
            <div class="glass p-6 rounded-[2.5rem] relative overflow-hidden">
                <div class="flex justify-between items-start mb-4">
                    <h2 class="text-xl font-bold">ملخص الحالة</h2>
                    <i data-lucide="activity" class="text-green-500 w-5 animate-pulse"></i>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                        <span class="text-[10px] text-slate-500 block">المشاريع</span>
                        <span id="active-count" class="text-2xl font-bold">0</span>
                    </div>
                    <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                        <span class="text-[10px] text-slate-500 block">المخاطر</span>
                        <span id="risk-count" class="text-2xl font-bold text-red-500">0</span>
                    </div>
                </div>
            </div>
            <div id="projects-list" class="space-y-4"></div>
        </section>

        <section id="details-view" class="hidden">
            <button onclick="showDashboard()" class="mb-4 text-slate-400 flex items-center gap-2 text-xs">
                <i data-lucide="arrow-right" class="w-4 h-4"></i> العودة
            </button>
            <div id="project-insights" class="mb-6"></div>
            
            <div class="grid grid-cols-2 gap-3 mb-8">
                <button onclick="generateReport('مالك')" class="bg-blue-600/20 border border-blue-500/50 p-4 rounded-2xl flex flex-col items-center gap-2">
                    <i data-lucide="user" class="text-blue-400"></i>
                    <span class="text-xs font-bold">تقرير للمالك</span>
                </button>
                <button onclick="generateReport('استشاري')" class="bg-purple-600/20 border border-purple-500/50 p-4 rounded-2xl flex flex-col items-center gap-2">
                    <i data-lucide="briefcase" class="text-purple-400"></i>
                    <span class="text-xs font-bold">تقرير للاستشاري</span>
                </button>
            </div>

            <div id="wbs-container" class="space-y-3"></div>
        </section>
    </main>

    <div id="report-modal" class="fixed inset-0 bg-black/95 hidden z-[200] p-6 flex items-end">
        <div class="glass w-full p-8 rounded-[2.5rem] border border-blue-500/50 report-modal shadow-[0_0_50px_rgba(59,130,246,0.2)]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold flex items-center gap-2">
                    <i data-lucide="file-text" class="text-blue-500"></i> مسودة التقرير الذكي
                </h3>
                <button onclick="closeReport()"><i data-lucide="x" class="text-slate-500"></i></button>
            </div>
            <div class="bg-slate-900/80 p-5 rounded-2xl mb-6 max-h-[40vh] overflow-y-auto">
                <p id="report-content" class="text-sm leading-relaxed text-slate-300"></p>
            </div>
            <button id="share-btn" class="w-full neon-glow bg-blue-600 p-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                <i data-lucide="share-2" class="w-5 h-5"></i> مشاركة عبر WhatsApp
            </button>
        </div>
    </div>

    <div class="fixed bottom-6 left-6 right-6 glass p-2 rounded-full flex justify-around items-center border border-white/10 shadow-2xl z-[100]">
        <button onclick="showDashboard()" class="p-4 text-blue-500"><i data-lucide="home"></i></button>
        <button onclick="alert('BIM View - Active')" class="p-4 text-slate-400"><i data-lucide="layout"></i></button>
        <button onclick="alert('Camera - Active')" class="p-4 text-slate-400"><i data-lucide="camera"></i></button>
    </div>

    <script>
        let projects = JSON.parse(localStorage.getItem('taha_ai_db')) || [];
        let currentProjectId = null;

        function sync() {
            localStorage.setItem('taha_ai_db', JSON.stringify(projects));
            renderDashboard();
        }

        function renderDashboard() {
            const list = document.getElementById('projects-list');
            list.innerHTML = '';
            document.getElementById('active-count').innerText = projects.length;
            projects.forEach(p => {
                list.innerHTML += `
                    <div onclick="viewAIProject(${p.id})" class="glass p-6 rounded-[2rem] border-r-4 border-blue-600">
                        <h4 class="font-bold text-lg">${p.name}</h4>
                        <p class="text-[10px] text-slate-500 mb-3">${p.desc || 'جاري العمل'}</p>
                        <div class="flex items-center gap-3">
                            <div class="flex-1 bg-slate-900 h-1 rounded-full overflow-hidden">
                                <div class="bg-blue-600 h-full" style="width: ${p.progress}%"></div>
                            </div>
                            <span class="text-[10px] font-bold text-blue-400">${p.progress}%</span>
                        </div>
                    </div>`;
            });
            lucide.createIcons();
        }

        function viewAIProject(id) {
            currentProjectId = id;
            const p = projects.find(item => item.id === id);
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('details-view').classList.remove('hidden');
            document.getElementById('project-insights').innerHTML = `<h2 class="text-2xl font-bold">${p.name}</h2><p class="text-blue-500 text-xs font-bold uppercase">قاعدة بيانات المهندس أحمد طه</p>`;
            
            const container = document.getElementById('wbs-container');
            container.innerHTML = '<h3 class="text-xs font-bold text-slate-500 mb-4">بنود العمل الجارية</h3>';
            (p.tasks || ["تأسيس الموقع"]).forEach(t => {
                container.innerHTML += `<div class="glass p-4 rounded-2xl flex justify-between items-center mb-2"><span class="text-sm">${t}</span><i data-lucide="check-circle-2" class="w-4 h-4 text-slate-700"></i></div>`;
            });
            lucide.createIcons();
        }

        function generateReport(target) {
            const p = projects.find(item => item.id === currentProjectId);
            let content = "";
            const date = new Date().toLocaleDateString('ar-EG');

            if (target === 'مالك') {
                content = `السيد المحترم مالك مشروع ${p.name}،\n\nنود إفادتكم بأن العمل يسير بخطى ثابتة، حيث وصلت نسبة الإنجاز الكلية إلى ${p.progress}%. تم الانتهاء من معظم البنود الحرجة، ونحن الآن بصدد اللمسات النهائية لضمان تسليم المشروع بأعلى جودة تليق بسيادتكم.\n\nتحياتي،\nالمهندس أحمد طه`;
            } else {
                content = `السيد الاستشاري المحترم لمشروع ${p.name}،\n\nتقرير الحالة الفنية بتاريخ ${date}:\n1. نسبة الإنجاز: ${p.progress}%\n2. المهام الحالية: ${p.tasks.join('، ')}.\n3. ملاحظات رقابية: تم رصد بعض التعارضات في المسار الحرج وجاري المعالجة وفقاً للأصول الهندسية.\n\nيرجى التوجيه بالاعتماد.\n\nالمهندس أحمد طه`;
            }

            document.getElementById('report-content').innerText = content;
            document.getElementById('report-modal').classList.remove('hidden');
            
            document.getElementById('share-btn').onclick = () => {
                const url = `https://wa.me/?text=${encodeURIComponent(content)}`;
                window.open(url, '_blank');
            };
        }

        function closeReport() { document.getElementById('report-modal').classList.add('hidden'); }
        function showDashboard() { document.getElementById('dashboard-view').classList.remove('hidden'); document.getElementById('details-view').classList.add('hidden'); }
        function showAddProjectModal() { 
            const name = prompt("اسم المشروع الجديد:");
            if(name) {
                projects.push({id: Date.now(), name, progress: 10, tasks: ["تجهيز الموقع", "توريد خامات", "بدء الأعمال"]});
                sync();
            }
        }

        sync();
        lucide.createIcons();
    </script>
</body>
</html>
