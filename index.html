        <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AhmƏd TAHA - manage CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #0b0f1a; color: #e2e8f0; }
        .ai-active { border: 2px solid #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .input-field { background: #161e2d; border: 1px solid #1e293b; padding: 12px; border-radius: 12px; width: 100%; color: white; outline: none; }
    </style>
</head>
<body class="p-4 pb-24">

    <header class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-bold text-blue-500">مركز التحكم الكامل</h1>
            <p class="text-xs text-slate-500">م. أحمد طه - إدارة المشاريع الذكية</p>
        </div>
        <div class="bg-blue-600/10 p-2 rounded-full"><i data-lucide="cpu" class="text-blue-500 animate-pulse"></i></div>
    </header>

    <div id="active-project-controller" class="hidden glass p-6 rounded-3xl bg-slate-900/50 mb-8 border border-blue-500/30">
        <h2 id="ctrl-name" class="text-xl font-bold mb-4">اسم المشروع</h2>
        
        <div class="space-y-4">
            <div>
                <label class="text-xs text-slate-400">تحديث نسبة الإنجاز الفعلي (%)</label>
                <input type="range" id="prog-slider" min="0" max="100" class="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-blue-600">
                <div class="flex justify-between text-[10px] mt-1"><span id="prog-val">0%</span><span>100%</span></div>
            </div>

            <div>
                <label class="text-xs text-slate-400">إضافة مهمة جديدة (WBS)</label>
                <div class="flex gap-2">
                    <input type="text" id="task-input" class="input-field text-sm" placeholder="مثلاً: صب الأعمدة...">
                    <button onclick="addNewTask()" class="bg-blue-600 px-4 rounded-xl"><i data-lucide="plus" class="w-4"></i></button>
                </div>
            </div>

            <div class="bg-blue-900/20 p-4 rounded-2xl border-r-4 border-blue-500">
                <h4 class="text-xs font-bold text-blue-400 mb-1 flex items-center gap-2">
                    <i data-lucide="brain" class="w-4 h-4"></i> تحليل الذكاء الاصطناعي للموقف:
                </h4>
                <p id="ai-feedback" class="text-xs italic text-slate-300">في انتظار البيانات لتحليل المسار...</p>
            </div>
        </div>
    </div>

    <div id="projects-container" class="space-y-4">
        </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-slate-950/80 backdrop-blur-md flex justify-around border-t border-slate-800">
        <button onclick="renderAll()" class="flex flex-col items-center gap-1 text-blue-500"><i data-lucide="layout-grid"></i><span class="text-[10px]">المشاريع</span></button>
        <button onclick="alert('فتح الكاميرا للتحليل البصري...')" class="flex flex-col items-center gap-1 text-slate-500"><i data-lucide="camera"></i><span class="text-[10px]">الميدان</span></button>
    </div>

    <script>
        let projects = JSON.parse(localStorage.getItem('taha_pro_db')) || [];
        let currentId = null;

        function renderAll() {
            const container = document.getElementById('projects-container');
            document.getElementById('active-project-controller').classList.add('hidden');
            container.innerHTML = projects.length ? '' : '<div class="text-center p-10 text-slate-600">لا توجد مشاريع.. اضغط زر الإضافة</div>';
            
            projects.forEach(p => {
                container.innerHTML += `
                    <div onclick="openController(${p.id})" class="bg-slate-900 p-5 rounded-2xl border border-slate-800 active:scale-95 transition-all">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="font-bold">${p.name}</h3>
                            <span class="text-[10px] text-blue-500 font-bold">${p.progress}%</span>
                        </div>
                        <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                            <div class="bg-blue-600 h-full" style="width: ${p.progress}%"></div>
                        </div>
                    </div>`;
            });
            lucide.createIcons();
        }

        function openController(id) {
            currentId = id;
            const p = projects.find(x => x.id === id);
            document.getElementById('active-project-controller').classList.remove('hidden');
            document.getElementById('ctrl-name').innerText = p.name;
            document.getElementById('prog-slider').value = p.progress;
            document.getElementById('prog-val').innerText = p.progress + '%';
            runAIAnalysis(p);
        }

        function runAIAnalysis(p) {
            const feedback = document.getElementById('ai-feedback');
            if(p.progress < 20) feedback.innerText = "⚠️ تحذير: المشروع في بدايته، تأخر التوريدات الآن سيؤدي لفشل المسار الحرج لاحقاً.";
            else if(p.progress > 80) feedback.innerText = "✅ الحالة ممتازة: المشروع في مرحلة الإنهاء، تأكد من مطابقة بنود الكهرباء مع السباكة قبل التسليم.";
            else feedback.innerText = "ℹ️ ملاحظة: معدل العمل طبيعي، يرجى توثيق صور الموقع لضمان جودة التنفيذ.";
        }

        // تحديث النسبة فوراً
        document.getElementById('prog-slider').oninput = function() {
            const val = this.value;
            document.getElementById('prog-val').innerText = val + '%';
            const p = projects.find(x => x.id === currentId);
            p.progress = parseInt(val);
            localStorage.setItem('taha_pro_db', JSON.stringify(projects));
            runAIAnalysis(p);
        };

        function addNewTask() {
            const task = document.getElementById('task-input').value;
            if(!task) return;
            alert(`تم ربط المهمة [${task}] بذكاء بجدول المسار الحرج للمشروع.`);
            document.getElementById('task-input').value = '';
        }

        // إضافة مشروع جديد (للتجربة)
        if(projects.length === 0) {
            projects.push({id: 1, name: "فيلا العبور", progress: 45, tasks: []});
            localStorage.setItem('taha_pro_db', JSON.stringify(projects));
        }

        renderAll();
        lucide.createIcons();
    </script>
</body>
</html>
