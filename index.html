<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المهندس أحمد طه - الإدارة الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; }
        .clash-card { border: 2px solid #ef4444; background: rgba(239, 68, 68, 0.1); }
        .success-card { border: 2px solid #22c55e; background: rgba(34, 197, 94, 0.1); }
    </style>
</head>
<body class="p-4">
    <header class="mb-6 text-center border-b border-slate-700 pb-4">
        <h1 class="text-2xl font-bold text-blue-400">منظومة المهندس أحمد طه</h1>
        <p class="text-sm text-slate-400">إدارة فيلا العبور | بيت الوطن | الأندلس</p>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-slate-800 p-3 rounded-lg text-center">
            <span class="text-xs block text-slate-400">إنجاز العبور</span>
            <span class="text-xl font-bold text-red-500">75%</span>
        </div>
        <div class="bg-slate-800 p-3 rounded-lg text-center">
            <span class="text-xs block text-slate-400">تأخر المسار</span>
            <span class="text-xl font-bold text-yellow-500">60 يوم</span>
        </div>
    </div>

    <div class="bg-slate-800 p-5 rounded-xl shadow-2xl mb-6">
        <h2 class="text-lg font-semibold mb-4 border-r-4 border-blue-500 pr-2">تقرير الموقع اليومي</h2>
        
        <label class="block text-sm mb-1">اختر المشروع:</label>
        <select id="project" class="w-full bg-slate-900 border border-slate-700 p-3 rounded mb-4">
            <option>فيلا العبور - تشطيبات</option>
            <option>بيت الوطن - خرسانات</option>
            <option>عمارة الأندلس - مباني</option>
        </select>

        <label class="block text-sm mb-1">وقت وصول الأطقم الفنية:</label>
        <input type="time" id="arrivalTime" value="10:10" class="w-full bg-slate-900 border border-slate-700 p-3 rounded mb-4 text-white">

        <button onclick="reportClash()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-lg mb-4 flex items-center justify-center gap-2 transition-all">
            <span>⚠️ إبلاغ عن تعارض فني (Clash)</span>
        </button>

        <div id="clashSection" class="hidden clash-card p-4 rounded-lg mb-4 animate-pulse">
            <label class="block text-sm font-bold text-red-400 mb-2">وصف التعارض المعماري/الكهربائي:</label>
            <textarea id="clashDesc" placeholder="مثال: فتحات الجبس لا تطابق مخارج التكييف..." class="w-full bg-slate-900 border border-red-500 p-2 rounded text-sm text-white"></textarea>
            <button class="mt-2 bg-blue-600 px-4 py-2 rounded text-xs">📸 رفع صورة المعاينة</button>
        </div>

        <button onclick="submitReport()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg shadow-lg">إرسال التقرير للمكتب الرئيسي</button>
    </div>

    <div id="log" class="space-y-3 text-xs">
        </div>

    <script>
        function reportClash() {
            document.getElementById('clashSection').classList.toggle('hidden');
        }

        function submitReport() {
            const time = document.getElementById('arrivalTime').value;
            const project = document.getElementById('project').value;
            const log = document.getElementById('log');
            
            // حساب الهدر التشغيلي
            let waste = "0%";
            if(time > "07:00") waste = "نسبة الهدر المادي: 15%";

            const entry = document.createElement('div');
            entry.className = "bg-slate-700 p-3 rounded-lg border-r-4 border-green-500";
            entry.innerHTML = `
                <strong>${project}</strong><br>
                وصول: ${time} | <span class="text-red-400">${waste}</span><br>
                <small class="text-slate-400">تم التوثيق في: ${new Date().toLocaleTimeString()}</small>
            `;
            log.prepend(entry);
            alert("تم إرسال التقرير بنجاح للسيد أحمد طه");
        }
    </script>
</body>
</html>
