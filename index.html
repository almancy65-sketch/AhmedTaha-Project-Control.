<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام السيادة الهندسي | م. أحمد طه</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #020617; color: #f1f5f9; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 2rem; }
        .stage-card { transition: all 0.3s ease; border-right: 4px solid transparent; }
        .stage-card.active { border-right-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .neo-btn { box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        input, select, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; border-radius: 12px !important; padding: 12px !important; outline: none; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <nav class="sticky top-0 z-50 glass-card m-4 p-5 flex justify-between items-center shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-xl neo-btn">
                <i data-lucide="shield-check" class="text-white w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tighter">TAHA <span class="text-blue-500">SYSTEM</span></h1>
                <p class="text-[9px] text-slate-500 font-bold uppercase">مركز الإدارة الشاملة</p>
            </div>
        </div>
        <button onclick="toggleModal('project-modal', true)" class="bg-blue-600/20 text-blue-400 p-2 rounded-full border border-blue-500/30">
            <i data-lucide="plus" class="w-6 h-6"></i>
        </button>
    </nav>

    <main id="dashboard" class="p-4 space-y-6">
        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card p-5">
                <span class="text-[10px] text-slate-500 font-bold uppercase">إجمالي المشاريع</span>
                <h2 id="total-projects" class="text-3xl font-black text-white">0</h2>
            </div>
            <div class="glass-card p-5">
                <span class="text-[10px] text-slate-500 font-bold uppercase">الحالة التشغيلية</span>
                <h2 class="text-xl font-black text-green-500">Active</h2>
            </div>
        </div>
        
        <h3 class="text-xs font-bold text-slate-500 px-2 flex items-center gap-2">
            <i data-lucide="layers" class="w-4 h-4"></i> مصفوفة المشروعات الحالية
        </h3>
        <div id="projects-grid" class="space-y-4"></div>
    </main>

    <main id="control-center" class="hidden p-4">
        <button onclick="showDashboard()" class="mb-6 text-slate-400 flex items-center gap-2 text-sm">
            <i data-lucide="chevron-right" class="w-5 h-5"></i> العودة للمصفوفة
        </button>
        
        <div id="project-header-info" class="mb-6"></div>

        <div class="glass-card p-6 mb-8 border-r-4 border-yellow-500">
            <h4 class="text-xs font-bold text-yellow-500 mb-2 flex items-center gap-2">
                <i data-lucide="brain-circuit" class="w-5 h-5"></i> نظام التوجيه الذكي
            </h4>
            <p id="ai-guidance" class="text-sm text-slate-300 italic leading-relaxed"></p>
        </div>

        <div class="space-y-4">
            <h3 class="text-xs font-bold text-slate-500 uppercase">إدارة مراحل المشروع (WBS)</h3>
            <div id="stages-container" class="space-y-3"></div>
        </div>

        <div class="grid grid-cols-2 gap-4 mt-8">
            <button onclick="generateReport('مالك')" class="glass-card p-5 flex flex-col items-center gap-2 border-blue-500/40">
                <i data-lucide="user" class="text-blue-500"></i>
                <span class="text-xs font-bold">تقرير المالك</span>
            </button>
            <button onclick="generateReport('استشاري')" class="glass-card p-5 flex flex-col items-center gap-2 border-purple-500/40">
                <i data-lucide="briefcase" class="text-purple-400"></i>
                <span class="text-xs font-bold">تقرير الاستشاري</span>
            </button>
        </div>
    </main>

    <div id="project-modal" class="fixed inset-0 bg-black/95 hidden z-[100] p-6 flex items-center">
        <div class="glass-card w-full p-8 shadow-2xl">
            <h3 class="text-2xl font-black mb-6">تأسيس مشروع جديد</h3>
            <div class="space-y-4">
                <input type="text" id="new-p-name" placeholder="اسم المشروع (مثلاً: عمارة النرجس)" class="w-full">
                <input type="text" id="new-p-location" placeholder="الموقع الجغرافي" class="w-full">
                <div class="flex gap-2">
                    <button onclick="saveProject()" class="flex-1 bg-blue-600 p-4 rounded-2xl font-bold neo-btn">حفظ وتأسيس</button>
                    <button onclick="toggleModal('project-modal', false)" class="flex-1 bg-slate-800 p-4 rounded-2xl font-bold">إلغاء</button>
                </div>
            </div>
        </div>
    </div>

    <div id="report-modal" class="fixed inset-0 bg-black hidden z-[200] p-6 overflow-y-auto">
        <div class="glass-card p-8 min-h-screen">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-blue-500">التقرير الذكي المولد</h2>
                <button onclick="toggleModal('report-modal', false)"><i data-lucide="x"></i></button>
            </div>
            <div id="report-body" class="bg-slate-900/50 p-6 rounded-2xl text-sm leading-relaxed mb-6 whitespace-pre-wrap"></div>
            <button id="whatsapp-btn" class="w-full bg-green-600 p-5 rounded-2xl font-bold flex items-center justify-center gap-3">
                <i data-lucide="message-circle"></i> إرسال عبر واتساب
            </button>
        </div>
    </div>

    <div class="fixed bottom-6 left-6 right-6 glass-card p-3 flex justify-around items-center z-[90] shadow-2xl border-white/5">
        <button onclick="showDashboard()" class="p-3 text-blue-500"><i data-lucide="layout-grid"></i></button>
        <button onclick="alert('وحدة الـ BIM قيد التحميل...')" class="p-3 text-slate-500"><i data-lucide="box"></i></button>
        <button onclick="alert('فتح الكاميرا للتوثيق...')" class="p-3 text-slate-500"><i data-lucide="camera"></i></button>
    </div>

    <script>
        // Database logic
        let projects = JSON.parse(localStorage.getItem('taha_supreme_db')) || [];
        let currentPId = null;

        function sync() {
            localStorage.setItem('taha_supreme_db', JSON.stringify(projects));
            renderDashboard();
            document.getElementById('total-projects').innerText = projects.length;
        }

        function toggleModal(id, show) {
            document.getElementById(id).classList.toggle('hidden', !show);
        }

        function saveProject() {
            const name = document.getElementById('new-p-name').value;
            const loc = document.getElementById('new-p-location').value;
            if(!name) return;

            const newProject = {
                id: Date.now(),
                name,
                location: loc,
                stages: [
                    { name: "أعمال الخرسانات والأساسات", progress: 0, tasks: ["حفر الموقع", "نجارة القواعد", "حدادة القواعد", "صب الخرسانة"] },
                    { name: "أعمال المباني والعزل", progress: 0, tasks: ["توريد الطوب", "بناء القواطيع", "عزل الحمامات"] },
                    { name: "أعمال التشطيبات النهائية", progress: 0, tasks: ["تأسيس سباكة", "تأسيس كهرباء", "لياسة", "دهانات"] }
                ]
            };
            projects.push(newProject);
            sync();
            toggleModal('project-modal', false);
            document.getElementById('new-p-name').value = '';
        }

        function renderDashboard() {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '';
            projects.forEach(p => {
                const totalProgress = Math.round(p.stages.reduce((acc, s) => acc + s.progress, 0) / 3);
                grid.innerHTML += `
                    <div onclick="openProject(${p.id})" class="glass-card p-6 active:scale-95 transition-all">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="text-xl font-bold text-white">${p.name}</h4>
                                <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">${p.location || 'موقع غير محدد'}</p>
                            </div>
                            <button onclick="deleteProject(event, ${p.id})" class="text-red-900"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="flex-1 bg-slate-800 h-2 rounded-full overflow-hidden">
                                <div class="bg-blue-600 h-full shadow-[0_0_10px_#3b82f6]" style="width: ${totalProgress}%"></div>
                            </div>
                            <span class="text-xs font-black">${totalProgress}%</span>
                        </div>
                    </div>`;
            });
            lucide.createIcons();
        }

        function openProject(id) {
            currentPId = id;
            const p = projects.find(x => x.id === id);
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('control-center').classList.remove('hidden');
            
            document.getElementById('project-header-info').innerHTML = `
                <h2 class="text-3xl font-black">${p.name}</h2>
                <p class="text-blue-500 font-bold text-sm">إدارة النطاق والتحكم بالمراحل</p>
            `;
            renderStages(p);
            updateAIGuidance(p);
        }

        function renderStages(p) {
            const container = document.getElementById('stages-container');
            container.innerHTML = '';
            p.stages.forEach((s, idx) => {
                container.innerHTML += `
                    <div class="glass-card p-5 stage-card">
                        <div class="flex justify-between items-center mb-4">
                            <h4 class="font-bold text-sm">${s.name}</h4>
                            <span class="text-blue-500 font-black">${s.progress}%</span>
                        </div>
                        <input type="range" value="${s.progress}" oninput="updateStageProg(${idx}, this.value)" class="w-full h-1 bg-slate-800 accent-blue-600 appearance-none rounded-lg cursor-pointer">
                        <div class="mt-4 flex flex-wrap gap-2">
                            ${s.tasks.map(t => `<span class="text-[9px] bg-slate-900 border border-slate-800 px-2 py-1 rounded-md text-slate-400">${t}</span>`).join('')}
                        </div>
                    </div>`;
            });
        }

        function updateStageProg(idx, val) {
            const p = projects.find(x => x.id === currentPId);
            p.stages[idx].progress = parseInt(val);
            localStorage.setItem('taha_supreme_db', JSON.stringify(projects));
            updateAIGuidance(p);
            // تحديث النسبة في الواجهة فوراً دون إعادة رندر كامل
            event.target.previousElementSibling.querySelector('.text-blue-500').innerText = val + '%';
        }

        function updateAIGuidance(p) {
            const guidance = document.getElementById('ai-guidance');
            const avg = p.stages.reduce((acc, s) => acc + s.progress, 0) / 3;
            
            if(p.stages[0].progress < 100) {
                guidance.innerText = `⚠️ تنبيه هندسي: مرحلة الأساسات لم تنتهِ بعد (${p.stages[0].progress}%). يُمنع البدء في تشوينات المباني لتجنب إعاقة حركة المعدات في الموقع.`;
            } else if (p.stages[2].progress > 0 && p.stages[1].progress < 50) {
                guidance.innerText = `🚨 خطأ في التسلسل: يتم تنفيذ تشطبيات حالياً بينما أعمال المباني متأخرة. هذا سيؤدي لهدر مادي كبير في إعادة التكسير.`;
            } else {
                guidance.innerText = `✅ تحليل المسار: المشروع يسير بتسلسل منطقي. نسبة الإنجاز الكلية ${Math.round(avg)}%. ننصح بتجهيز مستخلصات المقاولين للمرحلة القادمة.`;
            }
        }

        function generateReport(target) {
            const p = projects.find(x => x.id === currentPId);
            const avg = Math.round(p.stages.reduce((acc, s) => acc + s.progress, 0) / 3);
            let text = "";
            
            if(target === 'مالك') {
                text = `تقرير إنجاز دوري - مشروع: ${p.name}\nالسيد المالك المحترم،\nنحيطكم علماً بأن العمل بالموقع يسير بمعدل إنجاز ${avg}%.\n\nتفاصيل المراحل:\n- الإنشائي: ${p.stages[0].progress}%\n- المباني: ${p.stages[1].progress}%\n- التشطيبات: ${p.stages[2].progress}%\n\nالحالة العامة: المشروع مستقر وضمن الجدول الزمني.\nالمهندس المسؤول: أحمد طه`;
            } else {
                text = `تقرير فني للاستشاري - مشروع: ${p.name}\nعناية المكتب الاستشاري،\nيرجى مراجعة نسب التنفيذ الفعلي للمشروع:\n1. الأعمال الترابية والخرسانات: ${p.stages[0].progress}% (المهام المنجزة: ${p.stages[0].tasks.slice(0,2).join(', ')}).\n2. المعماري: ${p.stages[1].progress}%\n3. الكهروميكانيك: ${p.stages[2].progress}%\n\nملاحظة: تم مطابقة الأعمال مع الكود الهندسي.\nم. أحمد طه`;
            }

            document.getElementById('report-body').innerText = text;
            toggleModal('report-modal', true);
            document.getElementById('whatsapp-btn').onclick = () => {
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
            };
        }

        function deleteProject(e, id) {
            e.stopPropagation();
            if(confirm('هل تريد حذف المشروع نهائياً؟')) {
                projects = projects.filter(x => x.id !== id);
                sync();
            }
        }

        function showDashboard() {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('control-center').classList.add('hidden');
            renderDashboard();
        }

        // Init
        renderDashboard();
        document.getElementById('total-projects').innerText = projects.length;
        lucide.createIcons();
    </script>
</body>
</html>
